ulos de Capitalização, da Modalidade Incentivo, nos termos da Circular SUSEP nº 656\/2022. Cujas notas técnicas e Condições Gerais foram aprovadas por meio do Processo SUSEP nº 15414.652557\/2025-01, disponível para consulta em <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"http:\/\/www.susep.gov.br\">www.susep.gov.br<\/a> , de acordo com o número acima.<\/p><p><\/p><p>Com o objetivo de promover a compra de PONTOS do CLUBE PIX DO MILHÃO, a Empresa Promotora cederá, de forma gratuita, aos Clientes que, no período especificado neste regulamento, comprarem os pontos do Clube, o direito de participação em sorteios lastreados por Títulos de Capitalização, da Modalidade Incentivo, emitidos pela Via Capitalização SA<\/p><p>Na condição de subscritora de Títulos de Capitalização, caberá à Empresa Promotora o pagamento destes títulos, além do direito à recolha dos resgates previstos.<\/p><p>A promoção será veiculada pela internet, site <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https:\/\/www.pixdomilhao.com.br\/\">https:\/\/www.pixdomilhao.com.br\/<\/a> e redes sociais, nas condições e prazos citados neste regulamento.<\/p><p><\/p><p> <\/p><p>1.1. Poderão participar desta promoção para pessoas físicas, maiores de 16 (dezesseis) anos, capazes, residentes e domiciliados no Brasil, que ao longo do período de elegibilidade cumpram com todas as regras descritas neste Regulamento.<\/p><p>1.2. Ganharão o direito de participar dos sorteios previstos neste regulamento para todas as pessoas que, no período da promoção, descrito no item 2.2, adquirirem, por meio do link da campanha Sextou do Sonhos, os PONTOS do clube de benefícios CLUBE PIX DO MILHÃO.<\/p><p>• A cada PONTO comprado serão distribuídos 4 (quarto) números da sorte para participação EXCLUSIVA no sorteio de R$ 100 MIL da campanha Segunda dos Sonhos.<\/p><p>• Periodicamente o promotor poderá conceder números de sorte em dobro.<\/p><p>• Periodicamente o promotor poderá conceder números da sorte em triplo.<\/p><p>• A empresa promotora poderá, em qualquer momento da campanha, alterar a quantidade de números da sorte distribuídos por pontos adquiridos.<\/p><p>1.3. O sorteio ocorrerá nos termos do processo SUSEP nº 15414.652557\/2025-01, com numeração entre 0.000.000 e 9.999.999 para concorrer ao prêmio nas datas especificadas. <\/p><p><\/p><p><\/p><p>2.1. Sorteio será realizado em âmbito nacional.<\/p><p>2.2. A promoção terá início no dia 15\/06\/2026 às 21h01 e término no dia 22\/06\/2026 às 21h00.<\/p><p><\/p><p>3.1. A distribuição dos títulos se dará na forma descrita no item 1.2.<\/p><p><\/p><p>3.1. A distribuição dos títulos se dará na forma descrita no item 1.2.<\/p><p>3.2. A vigência, a data do sorteio e o valor da premiação desta modalidade exclusivamente inscritos na tabela a seguir:<\/p><p>Período de Elegibilidade Qtd Contemplados Valor de Premiação Data Sorteio<\/p><p>De 15\/06\/2026 às 21h01 até 22\/06\/2026 às 21h00 R$ - R$ 100.000,00<\/p><p><\/p><p><strong>FORMA DE APURAÇÃO<\/strong><\/p><p>3.3. O participante contemplado será aquele que coincidir com o Número da Sorte com o Número formado pelos 7 dígitos apurados do prêmio (sempre lidos da esquerda para a direita) da remoção da Super Sete, pela Caixa Econômica Federal:<\/p><p>zumbidor. Abaixo consta um exemplo hipotético de apuração do Número Sorteado:<\/p><p>Extração da Super Sete<\/p><p>Prêmio = 1985729<\/p><p>Número Sorteado: 1.985.729<\/p><p>3.4. Na hipótese de não ter sido distribuído o Número da Sorte que coincida com o Número Sorteado será aplicado a seguinte regra de aproximação: Será contemplando o Título que possui o Número da Sorte imediatamente superior e assim, sucessivamente, até que seja identificado um Número da Sorte que coincida com o Número Sorteado<\/p><p>3.5. Caso, por qualquer motivo, a Super Sete não venha a realizar a proteção nos dados previstos de sorteio, será considerada, para fins do disposto neste Capítulo, a remoção que vier a ser por ela realizada.<\/p>< /strong> inscrita no CNPJ sob o n.º 88.076.302\/0001-94 e com sede na Av. Carlos Gomes, nº 222 - Conjunto 901, Boa Vista, Porto Alegre\/RS, CEP 90480-000.<\/p><p><strong>Empresa Promotora:<\/strong> <strong>PIX DO MILHÃO CLUBE DE BENEFÍCIOS E VANTAGENS LTDA,<\/strong> pessoa jurídica de direto privado, inscrita no CNPJ sob o nº 30.682.309\/0001-70, com sede na Rua Gama e Melo, nº 34 – Sala 204, Bairro Varadouro, João Pessoa\/PB, CEP 58.010-450.<\/p><p><strong>Modalidade da Promoção: <\/strong>Distribuição gratuita de prêmios aos participantes que preencherem as condições constantes neste regulamento o direito de participar do sorteio relativo aos referidos títulos lastreados por Títulos de Capitalização, da Modalidade Incentivo, nos termos da Circular SUSEP n° 656\/2022. Cujas notas técnicas e Condições Gerais foram aprovadas por meio do Processos SUSEP nº 15414.652557\/2025-01, disponível para consulta em <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"http:\/\/www.susep.gov.br\">www.susep.gov.br<\/a>, de acordo com o número acima.<\/p><p><strong>OBJETIVO DA PROMOÇÃO<\/strong> <\/p><p>Com o objetivo de promover a compra de <strong>PONTOS <\/strong>do <strong>CLUBE<\/strong> <strong>PIX DO MILHÃO<\/strong>, a Empresa Promotora cederá, de forma gratuita, aos Clientes que, no período especificado neste regulamento, comprarem os pontos do Clube, o direito de participação em sorteios lastreados por Títulos de Capitalização, da Modalidade Incentivo, emitidos pela Via Capitalização S.A.<\/p><p>Na condição de subscritora dos Títulos de Capitalização, caberá à Empresa Promotora o pagamento destes títulos, além do direito ao recebimento do resgate neles previstos.<\/p><p>A promoção será veiculada pela internet, site <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https:\/\/www.pixdomilhao.com.br\/\">https:\/\/www.pixdomilhao.com.br\/<\/a> e redes sociais, nas condições e prazos citados neste regulamento.<\/p><p><strong>1. CRITÉRIOS DE PARTICIPAÇÃO<\/strong><\/p><p>1.1. Poderão participar desta promoção as pessoas físicas, maiores de 16 (dezesseis) anos, capazes, residentes e domiciliados no Brasil, que ao longo do período de elegibilidade cumprirem com todas as regras descritas neste Regulamento.<\/p><p>1.2. Ganharão o direito de participar dos sorteios previstos neste regulamento todos as pessoas que, no período da promoção, descrito no item 2.2, adquirirem, por meio do link da campanha <strong>SEXTA DO MILHÃO<\/strong>, os PONTOS do clube de benefícios <strong>CLUBE PIX DO MILHÃO<\/strong>.<\/p><p>·        A cada R$ 2,00 (dois reais) utilizados para adquirir 1 (um) ponto será distribuído 1 (um) número da sorte para participação EXCLUSIVA no sorteio de R$ 1.000.000,00 da campanha SEXTA DO MILHÃO.<\/p><p>·        Periodicamente a promotora poderá conceder números da sorte em dobro.<\/p><p>·        Periodicamente a promotora poderá conceder números da sorte em triplo.<\/p><p>·        A empresa promotora poderá, em qualquer instante da campanha alterar a quantidade de números da sorte distribuídos por pontos adquiridos.<\/p><p>1.3. O sorteio ocorrerá nos termos do processo SUSEP nº , com numeração entre 0.000.000 e 9.999.999 para concorrer ao prêmio nas datas especificadas.<\/p><p><strong>2. PRAZO E ABRANGÊNCIA DA PROMOÇÃO<\/strong><\/p><p>2.1. Sorteio será realizado em âmbito nacional.<\/p><p> 2.2. A promoção terá início no dia 05\/06\/2026 às 21h01 e término no dia 03\/07\/2026 às 21h00.<\/p><p> <\/p><p><strong>3. SEXTA DO MILHÃO<\/strong><\/p><p>3.1. A distribuição dos títulos se dará na forma descrita no item 1.2.<\/p><p>3.2. A vigência, a data de sorteio e o valor da premiação desta modalidade estará descrita na tabela a seguir:<\/p><p> <\/p><p><strong>Período de Elegibilidade: <\/strong>De 05\/06\/2026 às 21h01 até 03\/07\/2026 às 21h00<\/p><p><strong>Qtd Contemplados: <\/strong>1<\/p><p><strong>Valor de Premiação: <\/strong>R$    1.000.000,00<\/p><p><strong>Data Sorteio: 05<\/strong>\/06\/2026<\/p><p><strong>FORMA DE APURAÇÃO<\/strong><\/p><p>3.3. O participante contemplado será aquele que coincidir seu Número da Sorte com o Número formado pelos 7 dígitos apurados do prêmio (sempre lidos da esquerda para direita) da extração da Super Sete, pela Caixa Econômica Federal:<\/p><p>a. Abaixo consta um exemplo hipotético da apuração do Número Sorteado:<\/p><p> <\/p><p><strong>Extração da Super Sete<\/strong><\/p><p>Prêmio = 1985729<\/p><p><strong>Número Sorteado: 1.985.729<\/strong><\/p><p> <\/p><p>3.4. Na hipótese de não ter sido distribuído o Número da Sorte que coincida com o Número Sorteado será aplicado a seguinte regra de aproximação: Será contemplando o Título que possuir o Número da Sorte imediatamente superior e assim, sucessivamente, até que seja identificado um Número da Sorte que coincida com o Número Sorteado<\/p><p>3.5. Caso, por qualquer motivo, a Super Sete não venha a realizar a extração na data prevista de sorteio, será considerada, para fins do disposto neste Capítulo, a extração seguinte que vier a ser por ela realizada.<\/p><p>3.6. Caso a Caixa Econômica Federal suspenda definitivamente as extrações da Super Sete, ou modifique as referidas extrações de forma que não mais coincidam com as regras de sorteio estabelecidas nestas Condições Gerais, ou haja qualquer impedimento à vinculação da Loteria Federal aos sorteios previstos nestas Condições Gerais, a VIA Capitalização S.A, num prazo máximo de 30 (trinta) dias, promoverá o sorteio não realizado com aparelhos próprios e em local de livre acesso ao público, sob fiscalização de auditoria independente e em idênticas condições às previstas originalmente no título, dando prévia e ampla divulgação do fato.<\/p><p> 3.7. A probabilidade mínima de contemplação de cada Título, considerando todos os Títulos da série, será igual a uma chance em 10.000.000 para cada um dos sorteios previstos no regulamento da promoção comercial.<\/p><p> <\/p><p><strong>4. DISPOSIÇÕES GERAIS<\/strong><\/p><p>4.1. Os prêmios previstos nesta promoção comercial serão pagos líquidos de imposto de renda, os quais serão recolhidos diretamente pela Sociedade de Capitalização, na forma da legislação vigente.<\/p><p>4.2. O prêmio será disponibilizado ao contemplado num prazo máximo de 15 (quinze) dias úteis, contados da data da realização do sorteio, desde que o ganhador apresente cópia legível dos seguintes documentos: <\/p><p>·        CPF\/MF e Carteira de identidade, válidos;<\/p><p>·        Comprovante de residência atualizado;<\/p><p>·        Dados bancários para depósito.<\/p><p> 4.3. A Empresa Promotora será a responsável pelo contato e identificação dos ganhadores dos prêmios de sorteios.<\/p><p>4.4. A fidedignidade da informação é de responsabilidade única e exclusiva do contemplado, sendo certo que a ausência de algum dado ou imprecisão das informações poderá implicar na impossibilidade do pagamento do prêmio.<\/p><p>4.5. \tAo participarem desta Promoção nos termos deste Regulamento, todos os contemplados estarão automaticamente autorizando à Empresa Promotora, desde já e de pleno direito, de modo expresso e em caráter irrevogável e irretratável, o uso gratuito e livre de qualquer ônus ou encargo de seu nome, sua imagem e sua voz, e também em fotos, arquivos e\/ou meios digitais ou não, digitalizadas ou não, bem como em cartazes, filmes e\/ou spots, jingles e\/ou vinhetas, em qualquer tipo de mídia e\/ou peças promocionais, inclusive em televisão, rádio, jornal, cartazes, faixas, outdoors, mala-direta e na internet, ou em quaisquer outros suportes e\/ou meio de transmissão digital, com ou sem provedor, veiculação na imprensa através do trabalho da assessoria de imprensa da Empresa Promotora, para a ampla divulgação da conquista da recompensa, pelo prazo de 12 (doze) meses, contados da data de término desta promoção.<\/p><p>4.6. A autorização acima citada, exclusiva para este fim, não significa, nem implica ou resulta em obrigatoriedade de divulgação, tampouco em pagamento ao contemplado.<\/p><p>4.7. A participação nesta promoção é voluntária e pressupõe o conhecimento e aceite, por parte do Participante, de todas as diretrizes e condições previstas neste Regulamento.<\/p><p>4.8. A participação nesta promoção não gerará ao cliente da Empresa Promotora nenhum outro direito ou vantagem que não esteja expressamente previsto neste Regulamento. <\/p><p>4.9. Em caso de desclassificação do participante pelo descumprimento de quaisquer regras previstas neste regulamento, a critério da Empresa Promotora, o prêmio poderá ser transferido para um participante apto a receber a premiação, conforme regra de aproximação.<\/p><p>4.10.   A aprovação do Título pela SUSEP não implica, por parte da Autarquia, em incentivo ou recomendação à sua aquisição, representando, exclusivamente, sua adequação às normas em vigor.<\/p><p>4.11.   Durante o período de vigência desta promoção, as informações acerca da participação e os Números da Sorte poderão ser consultados através do <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https:\/\/www.pixdomilhao.com.br\/\">https:\/\/www.pixdomilhao.com.br\/<\/a> <\/p><p>4.12.   No caso de adiamento da extração realizada pela Caixa Econômica Federal utilizada neste regulamento, o período de elegibilidade pode ser estendido.<\/p><p>4.13.   A Empresa Promotora responsabiliza-se pelos direitos e obrigações decorrentes desta Promoção Comercial, respondendo por eventuais contestações sobre sua validade, seja por clientes e\/ou por Órgãos Públicos.<\/p><p>4.14.   A Empresa Promotora se reserva o direito de, a qualquer momento, alterar este Regulamento para atender a qualquer necessidade legal, assegurado que, nesses casos, promoverá nova e ampla divulgação das alterações realizadas.<\/p><p> 4.15.   Ficam impedidos de participar da presente promoção os diretores, administradores e funcionários da Empresa Promotora, da VIA CAP, ou de qualquer empresa envolvida em qualquer aspecto da execução e gestão desta promoção.<\/p><p>4.16.   As Condições Gerais que lastreiam os sorteios previstos neste regulamento podem ser consultadas através do site <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"http:\/\/www.susep.gov.br\/menu\/consulta-de-produtos-1\">http:\/\/www.susep.gov.br\/menu\/consulta-de-produtos-1<\/a> <\/p><p>4.17.   Dúvidas, controvérsias ou reclamações pertinentes a esta promoção deverão ser preliminarmente dirimidas pela Promotora.<\/p><p> 4.18.   Fica eleito o Foro da Comarca do domicílio do participante para dirimir quaisquer questões oriundas deste Regulamento. Qualquer disputa que surja em virtude do presente Regulamento será regulada pela legislação brasileira.<\/p><p> <\/p><p><strong>TERMO DE CESSÃO DE DIREITOS DE SORTEIOS<\/strong><\/p><p>PIX DO MILHÃO CLUBE DE BENEFÍCIOS E VANTAGENS LTDA, como promotora desta promoção comercial e detentora originária de todos os direitos decorrentes dos Títulos de Capitalização - Emitidos pela VIACAP, na Modalidade Incentivo, e aprovados através do processo SUSEP n.º 15414.652557\/2025-01 - notadamente dos direitos de sorteios e contemplação nos sorteios previstos neste regulamento, cede e transfere parcial ou integralmente aos participantes exclusivamente os seus direitos de participação nos sorteios. Esta cessão de direitos somente se aperfeiçoará com a reclamação do prêmio pelo participante cessionário, que deverá fazê-lo no prazo máximo de 60 (Sessenta) dias contados desde a data do sorteio.<\/p><p> <\/p><p style=\"text-align: center;\"><strong>SOBRE A AÇÃO \"RASPOU, ACHOU É PIX\"<\/strong><\/p><p style=\"text-align: justify;\">Todas as regras, critérios de participação, mecânica da promoção, forma de contemplação, prazos e demais condições aplicáveis estão devidamente descritos em nosso Regulamento Oficial, disponível no link abaixo:<\/p><p style=\"text-align: justify;\"><a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"http:\/\/promocao.pixdomilhao.com.br\/Regulamento-RASPOU.pdf\">http:\/\/promocao.pixdomilhao.com.br\/Regulamento-RASPOU.pdf<\/a><\/p><p style=\"text-align: justify;\">Recomendamos a leitura integral do documento para melhor compreensão do funcionamento da ação promocional, incluindo a dinâmica da raspadinha interativa, a atribuição dos Números da Sorte e os critérios oficiais de apuração e contemplação, conforme previsto nas normas da promoção.<\/p><p> <\/p>","startAt":"2025-11-18 22:00:00.000","title":"Pix do Milhão - 03\/07\/2026 - ED 089","endAt":"2026-07-04 00:00:00.000","scopes":"PUBLIC","slug":"2026-06-05-pix-do-milhao---03072026---ed-089","matrix":null,"susepProcess":"15414.652557\/2025-01","kind":"MAIN","status":"OPEN","drawDate":"2026-07-04 00:00:00.000"}]}}},"labels":{"siteName":"Pix do Milhão","pronoun":"o","siteTitle":"Pix do Milhão - Adquira seus pontos, ganhe números da sorte e concorra a prêmios de até R$ 1 milhão de reais."},"developer":"EVEN","secondaryRaffles":{"mode":"classic","quantityButtonsGrid":"3x1"},"services":{"tracking":{"gtmId":"GTM-MG2N3R84"}},"modules":{"internal":{"options":{},"enabled":true},"@luckymaker\/admin-ai-assistant":{"options":{},"enabled":true},"federalLottoRaffles":{"options":{},"enabled":true},"financials":{"options":{},"enabled":true},"raffle-matrixes":{"options":{},"enabled":true},"resellerMovements":{"options":{},"enabled":true},"userMovements":{"options":{},"enabled":true},"gamification":{"options":{},"enabled":true},"instant-games":{"options":{"customizations":{"SCRATCH_CARD":{"visual":{"colors":{"primary":"#F7B917"}},"gameplay":{"playAgain":{"chance":0},"publicListing":{"enabled":false},"reveal":{"delayMs":1000}},"i18n":{"namePlural":"Raspadinhas","ctaButtonLabel":"Raspe agora","upsell":{"description":"Aumente ainda mais as suas chances de ganhar adquirindo mais jogos abaixo!","title":"Não há mais raspadinhas"},"tutorial":{"instructions":"Raspe as 3 áreas.\nSe as 3 imagens forem iguais, você ganha o prêmio!\nAtenção: Todas as suas jogadas são gravadas."},"messages":{"loss":"😅 Quase lá! Você precisa da er números da sorte em triplo.</p><p style=\"text-align: justify;\">·       A empresa promotora poderá, em qualquer instante da campanha alterar a quantidade de números da sorte distribuídos por pontos adquiridos.</p><p style=\"text-align: justify;\">1.3. O sorteio ocorrerá nos termos do processo SUSEP nº , com numeração entre 0.000.000 e 9.999.999 para concorrer ao prêmio nas datas especificadas.</p><p> </p><p style=\"text-align: center;\"><span style=\"color: black;\"><strong>2. PRAZO E ABRANGÊNCIA DA PROMOÇÃO</strong></span></p><p style=\"text-align: justify;\">2.1. Sorteio será realizado em âmbito nacional.</p><p style=\"text-align: justify;\">2.2. A promoção terá início no dia 17/06/2026 às 21h01 e término no dia 26/06/2026 às 20h55.</p><p> </p><p style=\"text-align: center;\"><span style=\"color: black;\"><strong>3. SEXTOU DOS SONHOS</strong></span></p><p style=\"text-align: justify;\">3.1. A distribuição dos títulos se dará na forma descrita no item 1.2.</p><p> 3.2. A vigência, a data de sorteio e o valor da premiação desta modalidade estará descrita na tabela a seguir:</p><p> </p><p style=\"text-align: left;\"><span style=\"color: rgb(245, 245, 245);\"><strong>Período de Elegibilidade: </strong>De 17/06/2026 às 21h01 até 26/06/2026 às 20h55</span></p><p style=\"text-align: left;\"><span style=\"color: rgb(245, 245, 245);\"><strong>Qtd Contemplados: </strong>1</span></p><p style=\"text-align: left;\"><span style=\"color: rgb(245, 245, 245);\"><strong>Valor de Premiação: </strong>R$    100.000,00</span></p><p style=\"text-align: left;\"><span style=\"color: rgb(245, 245, 245);\"><strong>Data Sorteio: 26</strong>/06/2026</span></p><p style=\"text-align: center;\"></p><p><strong><u>FORMA DE APURAÇÃO</u></strong></p><p>3.3. O participante contemplado será aquele que coincidir seu Número da Sorte com o Número formado pelos 7 dígitos apurados do prêmio (sempre lidos da esquerda para direita) da extração da Super Sete, pela Caixa Econômica Federal:</p><p>a.  Abaixo  pessoa jurídica de direto privado, inscrita no CNPJ sob o nº 30.682.309/0001-70, com sede na Rua Gama e Melo, nº 34 – Sala 204, Bairro Varadouro, João Pessoa/PB, CEP 58.010-450.</p><p><strong>Modalidade da Promoção: </strong>Distribuição gratuita de prêmios aos participantes que preencherem as condições constantes neste regulamento o direito de participar do sorteio relativo aos referidos títulos lastreados por Títulos de Capitalização, da Modalidade Incentivo, nos termos da Circular SUSEP n° 656/2022. Cujas notas técnicas e Condições Gerais foram aprovadas por meio do Processos SUSEP nº 15414.652557/2025-01, disponível para consulta em <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"http://www.susep.gov.br\">www.susep.gov.br</a>, de acordo com o número acima.</p><p><strong>OBJETIVO DA PROMOÇÃO</strong> </p><p>Com o objetivo de promover a compra de <strong>PONTOS </strong>do <strong>CLUBE</strong> <strong>PIX DO MILHÃO</strong>, a Empresa Promotora cederá, de forma gratuita, aos Clientes que, no período especificado neste regulamento, comprarem os pontos do Clube, o direito de participação em sorteios lastreados por Títulos de Capitalização, da Modalidade Incentivo, emitidos pela Via Capitalização S.A.</p><p>Na condição de subscritora dos Títulos de Capitalização, caberá à Empresa Promotora o pagamento destes títulos, além do direito ao recebimento do resgate neles previstos.</p><p>A promoção será veiculada pela internet, site <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://www.pixdomilhao.com.br/\">https://www.pixdomilhao.com.br/</a> e redes sociais, nas condições e prazos citados neste regulamento.</p><p><strong>1. CRITÉRIOS DE PARTICIPAÇÃO</strong></p><p>1.1. Poderão participar desta promoção as pessoas físicas, maiores de 16 (dezesseis) anos, capazes, residentes e domiciliados no Brasil, que ao longo do período de elegibilidade cumprirem com todas as regras descritas neste Regulamento.</p><p>1.2. Ganharão o direito de participar dos sorteios previstos neste regulamento todos as pessoas que, no período da promoção, descrito no item 2.2, adquirirem, por meio do link da campanha <strong>SEXTA DO MILHÃO</strong>, os PONTOS do clube de benefícios <strong>CLUBE PIX DO MILHÃO</strong>.</p><p>·        A cada R$ 2,00 (dois reais) utilizados para adquirir 1 (um) ponto será distribuído 1 (um) número da sorte para participação EXCLUSIVA no sorteio de R$ 1.000.000,00 da campanha SEXTA DO MILHÃO.</p><p>·        Periodicamente a promotora poderá conceder números da sorte em dobro.</p><p>·        Periodicamente a promotora poderá conceder números da sorte em triplo.</p><p>·        A empresa promotora poderá, em qualquer instante da campanha alterar a quantidade de números da sorte distribuídos por pontos adquiridos.</p><p>1.3. O sorteio ocorrerá nos termos do processo SUSEP nº , com numeração entre 0.000.000 e 9.999.999 para concorrer ao prêmio nas datas especificadas.</p><p><strong>2. PRAZO E ABRANGÊNCIA DA PROMOÇÃO</strong></p><p>2.1. Sorteio será realizado em âmbito nacional.</p><p> 2.2. A promoção terá início no dia 05/06/2026 às 21h01 e término no dia 03/07/2026 às 21h00.</p><p> </p><p><strong>3. SEXTA DO MILHÃO</strong></p><p>3.1. A distribuição dos títulos se dará na forma descrita no item 1.2.</p><p>3.2. A vigência, a data de sorteio e o valor da premiação desta modalidade estará descrita na tabela a seguir:</p><p> </p><p><strong>Período de Elegibilidade: </strong>De 05/06/2026 às 21h01 até 03/07/2026 às 21h00</p><p><strong>Qtd Contemplados: </strong>1</p><p><strong>Valor de Premiação: </strong>R$    1.000.000,00</p><p><strong>Data Sorteio: 05</strong>/06/2026</p><p><strong>FORMA DE APURAÇÃO</strong></p><p>3.3. O participante contemplado será aquele que coincidir seu Número da Sorte com o Número formado pelos 7 dígitos apurados do prêmio (sempre lidos da esquerda para direita) da extração da Super Sete, pela Caixa Econômica Federal:</p><p>a. Abaixo consta um exemplo hipotético da apuração do Número Sorteado:</p><p> </p><p><strong>Extração da Super Sete</strong></p><p>Prêmio = 1985729</p><p><strong>Número Sorteado: 1.985.729</strong></p><p> </p><p>3.4. Na hipótese de não ter sido distribuído o Número da Sorte que coincida com o Número Sorteado será aplicado a seguinte regra de aproximação: Será contemplando o Título que possuir o Número da Sorte imediatamente superior e assim, sucessivamente, até que seja identificado um Número da Sorte que coincida com o Número Sorteado</p><p>3.5. Caso, por qualquer motivo, a Super Sete não venha a realizar a extração na data prevista de sorteio, será considerada, para fins do disposto neste Capítulo, a extração seguinte que vier a ser por ela realizada.</p><p>3.6. Caso a Caixa Econômica Federal suspenda definitivamente as extrações da Super Sete, ou modifique as referidas extrações de forma que não mais coincidam com as regras de sorteio estabelecidas nestas Condições Gerais, ou haja qualquer impedimento à vinculação da Loteria Federal aos sorteios previstos nestas Condições Gerais, a VIA Capitalização S.A, num prazo máximo de 30 (trinta) dias, promoverá o sorteio não realizado com aparelhos próprios e em local de livre acesso ao público, sob fiscalização de auditoria independente e em idênticas condições às previstas originalmente no título, dando prévia e ampla divulgação do fato.</p><p> 3.7. A probabilidade mínima de contemplação de cada Título, considerando todos os Títulos da série, será igual a uma chance em 10.000.000 para cada um dos sorteios previstos no regulamento da promoção comercial.</p><p> </p><p><strong>4. DISPOSIÇÕES GERAIS</strong></p><p>4.1. Os prêmios previstos nesta promoção comercial serão pagos líquidos de imposto de renda, os quais serão recolhidos diretamente pela Sociedade de Capitalização, na forma da legislação vigente.</p><p>4.2. O prêmio será disponibilizado ao contemplado num prazo máximo de 15 (quinze) dias úteis, contados da data da realização do sorteio, desde que o ganhador apresente cópia legível dos seguintes documentos: </p><p>·        CPF/MF e Carteira de identidade, válidos;</p><p>·        Comprovante de residência atualizado;</p><p>·        Dados bancários para depósito.</p><p> 4.3. A Empresa Promotora será a responsável pelo contato e identificação dos ganhadores dos prêmios de sorteios.</p><p>4.4. A fidedignidade da informação é de responsabilidade única e exclusiva do contemplado, sendo certo que a ausência de algum dado ou imprecisão das informações poderá implicar na impossibilidade do pagamento do prêmio.</p><p>4.5. \tAo participarem desta Promoção nos termos deste Regulamento, todos os contemplados estarão automaticamente autorizando à Empresa Promotora, desde já e de pleno direito, de modo expresso e em caráter irrevogável e irretratável, o uso gratuito e livre de qualquer ônus ou encargo de seu nome, sua imagem e sua voz, e também em fotos, arquivos e/ou meios digitais ou não, digitalizadas ou não, bem como em cartazes, filmes e/ou spots, jingles e/ou vinhetas, em qualquer tipo de mídia e/ou peças promocionais, inclusive em televisão, rádio, jornal, cartazes, faixas, outdoors, mala-direta e na internet, ou em quaisquer outros suportes e/ou meio de transmissão digital, com ou sem provedor, veiculação na imprensa através do trabalho da assessoria de imprensa da Empresa Promotora, para a ampla divulgação da conquista da recompensa, pelo prazo de 12 (doze) meses, contados da data de término desta promoção.</p><p>4.6. A autorização acima citada, exclusiva para este fim, não significa, nem implica ou resulta em obrigatoriedade de divulgação, tampouco em pagamento ao contemplado.</p><p>4.7. A participação nesta promoção é voluntária e pressupõe o conhecimento e aceite, por parte do Participante, de todas as diretrizes e condições previstas neste Regulamento.</p><p>4.8. A participação nesta promoção não gerará ao cliente da Empresa Promotora nenhum outro direito ou vantagem que não esteja expressamente previsto neste Regulamento. </p><p>4.9. Em caso de desclassificação do participante pelo descumprimento de quaisquer regras previstas neste regulamento, a critério da Empresa Promotora, o prêmio poderá ser transferido para um participante apto a receber a premiação, conforme regra de aproximação.</p><p>4.10.   A aprovação do Título pela SUSEP não implica, por parte da Autarquia, em incentivo ou recomendação à sua aquisição, representando, exclusivamente, sua adequação às normas em vigor.</p><p>4.11.   Durante o período de vigência desta promoção, as informações acerca da participação e os Números da Sorte poderão ser consultados através do <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://www.pixdomilhao.com.br/\">https://www.pixdomilhao.com.br/</a> </p><p>4.12.   No caso de adiamento da extração realizada pela Caixa Econômica Federal utilizada neste regulamento, o período de elegibilidade pode ser estendido.</p><p>4.13.   A Empresa Promotora responsabiliza-se pelos direitos e obrigações decorrentes desta Promoção Comercial, respondendo por eventuais contestações sobre sua validade, seja por clientes e/ou por Órgãos Públicos.</p><p>4.14.   A Empresa Promotora se reserva o direito de, a qualquer momento, alterar este Regulamento para atender a qualquer necessidade legal, assegurado que, nesses casos, promoverá nova e ampla divulgação das alterações realizadas.</p><p> 4.15.   Ficam impedidos de participar da presente promoção os diretores, administradores e funcionários da Empresa Promotora, da VIA CAP, ou de qualquer empresa envolvida em qualquer aspecto da execução e gestão desta promoção.</p><p>4.16.   As Condições Gerais que lastreiam os sorteios previstos neste regulamento podem ser consultadas através do site <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"http://www.susep.gov.br/menu/consulta-de-produtos-1\">http://www.susep.gov.br/menu/consulta-de-produtos-1</a> </p><p>4.17.   Dúvidas, controvérsias ou reclamações pertinentes a esta promoção deverão se
